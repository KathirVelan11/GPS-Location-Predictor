name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Generate sample data
        run: python src/generate_sample_data.py --out data/sample_gps.csv --days 20
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Smoke-test training pipeline
        run: |
          python src/train.py --data data/sample_gps.csv --out models
          python src/predict.py --datetime "2024-05-20 15:51:00"
